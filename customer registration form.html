<!DOCTYPE html>

<head>

    <title> customer registration page </title>
</head>

<body>
    <header>
        <h1>
            <center>
                <font color="orange">Abdul</font>
                <font color="blue">Bank</font>
            </center>
        </h1>

        <a href="index.html">About Bank</a> |

    </header>
    <hr>
    <main>
        <h1>
            <center> Costomer Registration Form </center>
        </h1>
        <form>
            <table border="1" align="center" cellpadding="10">
                <tr>
                    <td><label>Customer Name</label></td>
                    <td> <input type="text" id="customer" name="customer" placeholder="Customer Name"><br></td>
                </tr>
                <tr>
                    <td> <label>Password</label>
                    </td>
                    <td><input type="password" id="password" name="password" placeholder="Password">
                </tr>
                <tr>
                    <td> <label>confirm Password</label></td>
                    <td> <input type="password" id="confirmpassword" name="confirmpassword"
                            placeholder="Confirm Password"><br></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email" id="email" name="email" placeholder="Email"><br></td>
                </tr>
                <tr>
                    <td> <label>Mobile</label></td>
                    <td> <input type="tel" id="mobile" name="mobile" placeholder="Mobile"><br></td>
                </tr>
                <tr>
                    <td> <label>Date of Birth</label></td>
                    <td> <input type="date" id="date" name="date" placeholder="Date of Birth"><br></td>
                </tr>
                <tr>
                    <td><label>Gender</label></td>
                    <td><input type="radio" value="Male" id="gender1" name="gender">Male
                        <input type="radio" value="Female" id="gender2" name="gender">Female
                        <input type="radio" value="Others" id="gender3" name="gender">Others
                    </td>
                </tr>
                <tr>
                    <td> <label>Aadhar Number</label></td>
                    <td><input type="number" id="aadhar" name="aadhar" placeholder="Aadhar Number"><br></td>
                </tr>
                <tr>
                    <td> <label>Account Type</label></td>
                    <td><select id="accounttype" name="accounttype">
                            <option value="savings">savings</option>
                            <option value="current">current</option>
                            <option value="zero Balance">zeroBalance</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td> <label>PAN Upload</label></td>
                    <td> <input type="file" placeholder="Upload PAN Card"></td>
                </tr>
                <tr>
                    <td> <label>Terms</label></td>
                    <td><input type="checkbox" name="terms" value="terms">I Agree</td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Login">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </main>
    <hr>
    <footer>
        <h3>
            <center> copyright@abdul </center>
        </h3>
    </footer>

</body>

</html>
