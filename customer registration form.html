    <hr>
    <main>
        <h1>
            <center> Costomer Registration Form </center>
        </h1>
        <form>
            <label> Customer Name </label>
            <input type="text">
            <br>
            <label> Password </label>
            <input type="password">
            <br>
            <label> Conform Password </label>
            <input type="password">
            <br>
            <label> Email </label>
            <input type="email">
            <br>
            <label> Mobile </label>
            <input type="tel">
            <br>
            <label> Date Of Birth </label>
            <input type="date">
            <br>
            <label> Gender </label>
            <input type="radio" value="male"> Male
            <input type="radio" value="Female"> Female
            <br>
            <label> Acount Type </label>
            <select>
                <option value="Accounts">Accounts</option>
                <option value="savings account">Saving account</option>
                <option value="current account">current account</option>
                <option value="zero account">zero account</option>
            </select>
            <br>
            <label> Aadhaar Number </label>
            <input type="text" maxlength="12">
            <br>
            <label> PAN Upload </label>
            <input type="file">
            <br>
            <label> Address </label>
            <textarea rows="3" cols="15"></textarea>
            <br>
            <label> Terms </label>
            <input type="checkbox" value="agree"> I Agree
            <br>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </form>
    </main>
    <hr>
