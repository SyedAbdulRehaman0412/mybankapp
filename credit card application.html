    <hr>
    <main>
        <h1>
            <center> Credit Card Application </center>
        </h1>
        <form>
            <table border="1px" align="center" cellpadding="10px">
                <tr>
                    <td><label>Name</label></td>
                    <td> <input type="text" placeholder="Name"><br></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email" placeholder="Email"><br></td>
                </tr>
                <tr>
                    <td> <label>Phone</label></td>
                    <td> <input type="tel" placeholder="Phone"><br></td>
                </tr>
                <tr>
                    <td> <label>Salary</label></td>
                    <td><input type="number"><br></td>
                </tr>
                <tr>
                    <td><label>Employment</label></td>
                    <td><input type="radio" value="private" id="Private1" name="private">Private
                        <input type="radio" value="government" id="Government1" name="private">Government
                    </td>
                </tr>
                <tr>
                    <td> <label>Company Website</label>
                    </td>
                    <td><input type="url" placeholder="Company Website"></td>
                </tr>
                <tr>
                    <td> <label>Resume</label></td>
                    <td> <input type="file"></td>
                </tr>
                <tr>
                    <td> <label>Address</label></td>
                    <td> <textarea rows="4" col="25" placeholder="Enter your address"></textarea></td>
                </tr>
                <tr>
                    <td> <label>Card Type</label></td>
                    <td><select id="cardtype" name="cardtype">
                            <option value="gold">Gold</option>
                            <option value="Silver">Silver</option>
                            <option value="platinum">Platinum</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="submit">
                    </td>
                </tr>
            </table>

        </form>

    </main>
    <hr>
    <footer>
        <h3>
            <center> copyright@abdul </center>
        </h3>
    </footer>
