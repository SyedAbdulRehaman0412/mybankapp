    <main>
        <h1>
            <center> Branch Feedback </center>
        </h1>
        <form>
            <label> Name </label>
            <input type="text">
            <br>
            <label> Email </label>
            <input type="text">
            <br>
            <label> Branch </label>
            <select>
                <option value="Andhra Pradesh">Andhra Pradesh</option>
                <option value="Hyderabad">Hyderabad </option>
                <option value="Maharastra">Maharastra</option>
                <option value="Odissa">Odissa</option>
                <option value="Karnataka">Karnataka</option>
            </select>
            <br>
            <label> Visit Date </label>
            <input type="date">
            <br>
            <label> Rating </label>
            <input type="radio" value="Excellent"> Excellent
            <input type="radio" value="Good"> Good
            <input type="radio" value="Average"> Average
            <br>
            <label> Service Used </label>
            <input type="checkbox" value="ATM"> ATM
            <input type="checkbox" value="Loan"> Loan
            <input type="checkbox" value="Account"> Account
            <br>
            <label> Suggestions </label>
            <textarea rows="4" cols="20"></textarea>
            <br>

            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </form>

    </main>
