    </header>
    <hr>
    <main>
        <h1>
            <center> Branch Feedback </center>
        </h1>
        <form action="feedbackserver" name="feedback" method="post">
            <table border="1px" align="center" cellpadding="10px">
                <tr>
                    <td><label>Name</label></td>
                    <td> <input type="text" placeholder="Name"><br></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email" placeholder="Email"><br></td>
                </tr>
                <tr>
                    <td> <label>Branch</label></td>
                    <td><select id="branch" name="branch">
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Mumbair">Mumbai</option>
                            <option value="Goa">Goa</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td> <label>Visiting Date</label></td>
                    <td> <input type="date" placeholder="Visiting Date"><br></td>
                </tr>
                <tr>
                    <td><label>Rating</label></td>
                    <td><input type="radio" value="Rating" id="Excellent1" name="GOOD">Excellent
                        <input type="radio" value="Rating" id="Good1" name="GOOD">Good
                        <input type="radio" value="Rating" id="Average1" name="GOOD">Average
                    </td>
                </tr>
                <tr>
                    <td> <label>Sevices Used</label></td>
                    <td><input type="checkbox" name="terms" value="terms">ATM
                        <input type="checkbox" name="terms" value="terms">Loan
                        <input type="checkbox" name="terms" value="terms">Account
                    </td>
                </tr>
                <tr>
                    <td> <label>Address</label></td>
                    <td> <textarea rows="4" col="25" placeholder="Enter your address"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="submit">
                        <input type="Reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>

    </main>
    <hr>
    <footer>
        <h3>
            <center> copyright@abdul </center>
        </h3>
    </footer>

</body>

</html>
