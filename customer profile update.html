    <hr>
    <main>
        <h1>
            <center> Customer Profile Update </center>
        </h1>
        <form>
            <table align="center" border="1px" cellpadding="10px">
                <tr>
                    <td><label>Name</label></td>
                    <td> <input type="text" placeholder="Name"><br></td>
                </tr>
                <tr>
                    <td><label>Email</label></td>
                    <td><input type="email" placeholder="Email"><br></td>
                </tr>
                <tr>
                    <td> <label>Mobile</label></td>
                    <td> <input type="tel" placeholder="Mobile"><br></td>
                </tr>
                <tr>
                    <td> <label> Website</label>
                    </td>
                    <td><input type="url" placeholder="Company Website"></td>
                </tr>
                <tr>
                    <td> <label>Profile Picture</label></td>
                    <td> <input type="file" placeholder="Upload Profile Picture"></td>
                </tr>
                <tr>
                    <td> <label>City</label></td>
                    <td><select id="city" name="city">
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Mumbair">Mumbai</option>
                            <option value="Goa">Goa</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td> <label>DOB</label></td>
                    <td> <input type="date" placeholder="Date of Birth"><br></td>
                </tr>
                <tr>
                    <td> <label>Address</label></td>
                    <td> <textarea rows="4" col="25" placeholder="Enter your address"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="submit" placeholder="Submit">
                    </td>
                </tr>
            </table>
        </form>

    </main>
    <hr>
