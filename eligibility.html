<!DOCTYPE html>
<html lang="en">

<head>

    <title> customer registration page </title>
</head>

<body>
    <header>
        <h1>
            <center>
                <font color="orange">Abdul</font>
                <font color="blue">Bank</font>
            </center>
        </h1>

        <a href="index.html">About Bank</a> |
        <a href="loans.html">Loans</a> |
        <a href="branches.html"> Branches</a> |
        <a href="customer registration form.html">Registration Form </a> |
        <a href="login.html"> Login </a> |
        <a href="#"> Loan Eligibility Check </a> |
        <a href="emi calculator.html">EMI calculator </a> |
        <a href="open new bank account.html"> Open New Bank Account </a> |
        <a href="credit card application.html"> Credit Card Application </a> |
        <a href="customer profile update.html"> Customer Profile Update </a> |
        <a href="branch feedback.html"> Branch Feedback </a> |

    </header>
    <hr>
    <main>
        <h1>
            <center> Internet Banking Login </center>
        </h1>
        <form>
            <table align="center" border="1px" cellpadding="10">
                <tr>
                    <td><label>Name </label></td>
                    <td> <input type="text" id="name" name="name" placeholder="Name"><br></td>
                </tr>
                <tr>
                    <td> <label>Annual Income</label>
                    </td>
                    <td><input type="number" id="annualincome" name="annualincome" placeholder="Annual Income">
                </tr>
                <tr>
                    <td> <label>Existing EMI</label>
                    </td>
                    <td><input type="number" id="existingemi" name="existingemi" placeholder="Existing EMI">
                    </td>
                </tr>
                <tr>
                    <td> <label>Employement</label></td>
                    <td><input type="radio" value="Male" id="Salaried1" name="salary" placeholder="Employement">Salaried
                        <input type="radio" value="Female" id="Business1" name="salary"
                            placeholder="Employement">Bussiness
                    </td>
                </tr>
                <tr>
                    <td> <label>Loan Type</label></td>
                    <td><select id="loan" name="loan type">
                            <option value="education">Education</option>
                            <option value="current">Home</option>
                            <option value="zero Balance">Vechile</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td> <label>Loan Amount</label>
                    </td>
                    <td><input type="number" id="loanamount" name="loanamount" placeholder="Loan Amount"></td>
                </tr>
                <tr>
                    <td> <label>Start Date </label></td>
                    <td> <input type="date" id="startdate" name="startdate" placeholder="Start Date"><br></td>
                </tr>
                <tr>
                    <td> <label>Purpose</label></td>
                    <td> <textarea rows="4" col="25" placeholder="Enter loan purpose"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="check Eligibility">
                    </td>
                </tr>
            </table>

        </form>

    </main>
    <hr>
    <footer>
        <h3>
            <center> copyright@abdul </center>
        </h3>
    </footer>

</body>

</html>
